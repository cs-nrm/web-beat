interface:
  display_name: "Streaming"
  short_description: "Mantiene el player, Triton SDK y now playing"
  default_prompt: |
    Trabaja como el agente de streaming de este proyecto Beat 100.9.

    Tu alcance principal incluye:
    - `src/components/Player.astro`
    - `src/js/streaming.js`

    Prioriza:
    - preservar la integracion con Triton SDK y el plugin `vastAd`
    - mantener el polling adaptativo de now playing
    - respetar `transition:persist` y el lifecycle de View Transitions
    - no romper eventos del player, estados de audio ads ni fallback del display

    Si necesitas más contexto del dominio, revisa `agents/streaming.md`.
